<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR System</title>
  </head>
  <body>
    <div id="app">
      <div
        id="boot-loader"
        style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#040c20;color:#f8fafc;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;"
      >
        <div style="text-align:center;max-width:520px;padding:24px;">
          <div
            style="width:36px;height:36px;border:3px solid #334155;border-top-color:#facc15;border-radius:50%;margin:0 auto 14px auto;animation:spin 1s linear infinite;"
          ></div>
          <h1 style="margin:0 0 8px 0;font-size:20px;color:#facc15;">Joyno HR</h1>
          <p id="boot-message" style="margin:0;font-size:14px;color:#cbd5e1;">
            Connecting to server...
          </p>
        </div>
      </div>
    </div>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
